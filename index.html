<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A beautiful and modern Tic Tac Toe game built with HTML, CSS, and JavaScript.">
    <title>Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div id="status" class="status">Player X's Turn</div>
        <div id="board" class="board">
            <div class="cell" id="cell-0" data-index="0"></div>
            <div class="cell" id="cell-1" data-index="1"></div>
            <div class="cell" id="cell-2" data-index="2"></div>
            <div class="cell" id="cell-3" data-index="3"></div>
            <div class="cell" id="cell-4" data-index="4"></div>
            <div class="cell" id="cell-5" data-index="5"></div>
            <div class="cell" id="cell-6" data-index="6"></div>
            <div class="cell" id="cell-7" data-index="7"></div>
            <div class="cell" id="cell-8" data-index="8"></div>
        </div>
        <button id="restart" class="restart-btn">Restart Game</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
